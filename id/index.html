<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
	<link rel="stylesheet" href="css/style.css">
	<script src="https://kit.fontawesome.com/a076d05399.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
	<link rel="icon" href="demo_icon.gif" type="image/gif" sizes="16x16">

</head>

<body>
	
	<div class="container">
		<div class="header">
			<div class="logo">
				<a href="#"><img src="img/awake-logo.png" alt=""></a>
			</div>
			<div class="menu">
				<ul>
					<li><a href="#home">Home</a></li>
					<li><a href="#">Pages</a></li>
					<li><a href="#bg-2">Portfolio</a></li>
					<li><a href="#">Blog</a></li>
					<li><a href="#">Shop</a></li>
					<li><a href="#">Elements</a></li>
					<li><a href="#"><i class="fas fa-layer-group"></i></a></li>
					<li><a href="#"><i class="fas fa-bars"></i></a></li>
				</ul>
			</div>
		</div>
<!--		header-->
		<div class="content">
			<div class="bg-parallax-1" id="home">
				
			</div>
			<div class="bg-parallax-2" id="bg-2">
			
			</div>
		</div>
	</div>
	<div class="sticky">
		<ul>
			<li><a href="#"><i class="fas fa-circle-notch"></i></a></li>
			<li class="cart-icon"><a href="#"><i class="fas fa-luggage-cart"></i></a></li>
		</ul>
	</div>	
	<button onclick="topFunction()" id="myBtn" title="Go to top">Scroll to <i class="fas fa-arrow-right"></i></button>
	<script>
//Get the button
var mybutton = document.getElementById("myBtn");

// When the user scrolls down 20px from the top of the document, show the button
window.onscroll = function() {scrollFunction()};

function scrollFunction() {
  if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
    mybutton.style.display = "block";
  } else {
    mybutton.style.display = "none";
  }
}

// When the user clicks on the button, scroll to the top of the document
function topFunction() {
  document.body.scrollTop = 0;
  document.documentElement.scrollTop = 0;
}
</script>
</body>
</html>
